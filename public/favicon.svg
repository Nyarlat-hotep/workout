<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe600"/>
      <stop offset="50%"  stop-color="#ff6200"/>
      <stop offset="100%" stop-color="#ff0066"/>
    </linearGradient>
    <clipPath id="sc">
      <circle cx="16" cy="18" r="13"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#04000e"/>

  <!-- Outer magenta glow rings -->
  <circle cx="16" cy="18" r="15"   fill="none" stroke="#cc00ff" stroke-width="2.5" opacity="0.18"/>
  <circle cx="16" cy="18" r="13.8" fill="none" stroke="#ff00cc" stroke-width="1.2" opacity="0.35"/>

  <!-- Sun body -->
  <circle cx="16" cy="18" r="13" fill="url(#sun)"/>

  <!-- Horizontal stripes clipped to sun -->
  <rect x="0" y="21.5" width="32" height="1.3" fill="#04000e" clip-path="url(#sc)"/>
  <rect x="0" y="23.8" width="32" height="1.3" fill="#04000e" clip-path="url(#sc)"/>
  <rect x="0" y="26.1" width="32" height="1.3" fill="#04000e" clip-path="url(#sc)"/>
  <rect x="0" y="28.4" width="32" height="1.3" fill="#04000e" clip-path="url(#sc)"/>

  <!-- Horizon line -->
  <rect x="0" y="30" width="32" height="2" fill="#04000e"/>
  <line x1="0" y1="30" x2="32" y2="30" stroke="#ff00aa" stroke-width="0.6" opacity="0.7"/>
</svg>