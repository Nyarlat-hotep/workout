<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0040"/>
      <stop offset="100%" stop-color="#00091a"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff71ce"/>
      <stop offset="100%" stop-color="#c800a1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>

  <!-- Vaporwave perspective grid -->
  <line x1="0"  y1="24" x2="32" y2="24" stroke="#5500dd" stroke-width="0.5" opacity="0.7"/>
  <line x1="0"  y1="28" x2="32" y2="28" stroke="#5500dd" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="22" x2="0"  y2="32" stroke="#5500dd" stroke-width="0.4" opacity="0.5"/>
  <line x1="16" y1="22" x2="8"  y2="32" stroke="#5500dd" stroke-width="0.4" opacity="0.5"/>
  <line x1="16" y1="22" x2="16" y2="32" stroke="#5500dd" stroke-width="0.4" opacity="0.5"/>
  <line x1="16" y1="22" x2="24" y2="32" stroke="#5500dd" stroke-width="0.4" opacity="0.5"/>
  <line x1="16" y1="22" x2="32" y2="32" stroke="#5500dd" stroke-width="0.4" opacity="0.5"/>

  <!-- Dumbbell glow -->
  <rect x="2"  y="10" width="6"  height="13" rx="2" fill="#ff2d78" opacity="0.2" transform="translate(0.5,0.5)"/>
  <rect x="24" y="10" width="6"  height="13" rx="2" fill="#ff2d78" opacity="0.2" transform="translate(0.5,0.5)"/>

  <!-- Left plate -->
  <rect x="2"  y="10" width="6"  height="13" rx="2" fill="url(#db)"/>
  <!-- Bar -->
  <rect x="8"  y="14" width="16" height="4.5" rx="1.5" fill="url(#db)"/>
  <!-- Right plate -->
  <rect x="24" y="10" width="6"  height="13" rx="2" fill="url(#db)"/>

  <!-- Cyan highlight -->
  <rect x="2"  y="10"   width="6"  height="2.5" rx="2"   fill="#00f5ff" opacity="0.4"/>
  <rect x="24" y="10"   width="6"  height="2.5" rx="2"   fill="#00f5ff" opacity="0.4"/>
  <rect x="8"  y="14"   width="16" height="1.5" rx="0.5" fill="#00f5ff" opacity="0.3"/>

  <!-- Cyan outline -->
  <rect x="2"  y="10" width="6"  height="13" rx="2" fill="none" stroke="#00f5ff" stroke-width="0.6" opacity="0.5"/>
  <rect x="24" y="10" width="6"  height="13" rx="2" fill="none" stroke="#00f5ff" stroke-width="0.6" opacity="0.5"/>
</svg>