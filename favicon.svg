<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe600"/>
      <stop offset="50%"  stop-color="#ff6200"/>
      <stop offset="100%" stop-color="#ff0066"/>
    </linearGradient>
    <!-- Mask = circle shape with stripe bands cut out (transparent) -->
    <mask id="m">
      <circle cx="16" cy="16" r="16" fill="white"/>
      <rect x="0" y="19.4" width="32" height="1.4" fill="black"/>
      <rect x="0" y="22"   width="32" height="1.4" fill="black"/>
      <rect x="0" y="24.6" width="32" height="1.4" fill="black"/>
      <rect x="0" y="27.2" width="32" height="1.4" fill="black"/>
      <rect x="0" y="29.8" width="32" height="1.4" fill="black"/>
    </mask>
  </defs>

  <!-- Magenta glow rings (behind sun) -->
  <circle cx="16" cy="16" r="16" fill="none" stroke="#dd00ff" stroke-width="3" opacity="0.25"/>
  <circle cx="16" cy="16" r="15" fill="none" stroke="#ff00cc" stroke-width="1.5" opacity="0.45"/>

  <!-- Sun with stripes masked out -->
  <rect width="32" height="32" fill="url(#sun)" mask="url(#m)"/>
</svg>